version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: arena_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-81c679e67069021be7d4}
      POSTGRES_DB: arenad65
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arena_backend
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      - DATABASE_URL=postgres://postgres:${DB_PASSWORD:-81c679e67069021be7d4}@db:5432/arenad65?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-arena_d65_super_secret_key_change_in_production}
      - PORT=3333
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: arena_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
